name: Generate Changelog
 
on:
  workflow_dispatch:
    inputs:
      milestone:
        description: 'Milestone title in the server repo (e.g. v10.6)'
        required: true
        type: string
      version:
        description: 'Version label for changelog entry (e.g. 10.6)'
        required: true
        type: string
      server_repos:
        description: 'Comma-separated repos to pull PRs from'
        required: true
        default: 'mattermost/mattermost,mattermost/enterprise'
        type: string
      blog_post_url:
        description: 'Blog post URL for the Improvements section (e.g. https://mattermost.com/blog/mattermost-v11-6-is-now-available/)'
        required: false
        type: string
 
jobs:
  generate-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
 
    steps:
      # App 1: Read-only access to mattermost/mattermost and mattermost/enterprise.
      # Used by the Python script to fetch merged PRs and their release notes.
      # Credentials needed in Settings → Secrets and variables → Actions:
      #   CHANGELOG_READ_CLIENT_ID   (variable)  — Client ID from the mattermost+enterprise GitHub App
      #   CHANGELOG_READ_PRIVATE_KEY (secret)    — Private key from the mattermost+enterprise GitHub App
      - name: Get read token (source repos)
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2.1.0
        id: readToken
        with:
          app_id: "${{ vars.CHANGELOG_READ_CLIENT_ID }}"
          private_key: ${{ secrets.CHANGELOG_READ_PRIVATE_KEY }}
          installation_retrieval_mode: organization
          installation_retrieval_payload: mattermost
 
      # App 2: Read/write access to mattermost/docs.
      # Used to check out this repo, push the changelog branch, and open the PR.
      # Credentials needed in Settings → Secrets and variables → Actions:
      #   CHANGELOG_WRITE_CLIENT_ID   (variable) — Client ID from the docs GitHub App
      #   CHANGELOG_WRITE_PRIVATE_KEY (secret)   — Private key from the docs GitHub App
      - name: Get write token (docs repo)
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2.1.0
        id: writeToken
        with:
          app_id: "${{ vars.CHANGELOG_WRITE_CLIENT_ID }}"
          private_key: ${{ secrets.CHANGELOG_WRITE_PRIVATE_KEY }}
          installation_retrieval_mode: organization
          installation_retrieval_payload: mattermost
 
      - name: Checkout docs repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.writeToken.outputs.token }}
 
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install requests anthropic
 
      - name: Generate changelog
        env:
          GITHUB_TOKEN: ${{ steps.readToken.outputs.token }} # Read-only token for fetching PRs from source repos
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }} # Enables AI categorization and formatting — add under Settings → Secrets and variables → Actions
          MILESTONE: ${{ inputs.milestone }}
          VERSION: ${{ inputs.version }}
          REPOS: ${{ inputs.server_repos }}
          BLOG_POST_URL: ${{ inputs.blog_post_url }}
          CHANGELOG_PATH: source/product-overview/mattermost-v11-changelog.md
        run: python .github/scripts/generate_changelog.py
 
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ steps.writeToken.outputs.token }}
        run: |
          git config user.name "${{ vars.CHANGELOG_GIT_USERNAME }}"
          git config user.email "${{ vars.CHANGELOG_GIT_EMAIL }}"
          git checkout -b "changelog/${{ inputs.version }}"
          git add source/product-overview/mattermost-v11-changelog.md
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "docs: add changelog for ${{ inputs.version }}"
          git push origin "changelog/${{ inputs.version }}" --force
          gh pr create \
            --title "Changelog: ${{ inputs.version }}" \
            --body "Auto-generated changelog for milestone \`${{ inputs.milestone }}\` from \`${{ inputs.server_repos }}\`." \
            --base master \
            --head "changelog/${{ inputs.version }}"
