name: Generate Changelog
 
on:
  workflow_dispatch:
    inputs:
      milestone:
        description: 'Milestone title in the server repo (e.g. v10.6)'
        required: true
        type: string
      version:
        description: 'Version label for changelog entry (e.g. 10.6)'
        required: true
        type: string
      server_repos:
        description: 'Comma-separated repos to pull PRs from'
        required: true
        default: 'mattermost/mattermost,mattermost/enterprise'
        type: string
      blog_post_url:
        description: 'Blog post URL for the Improvements section (e.g. https://mattermost.com/blog/mattermost-v11-6-is-now-available/)'
        required: false
        type: string
 
jobs:
  generate-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
 
    steps:
      # App 1: Read-only access to source repos (default: mattermost/mattermost and mattermost/enterprise).
      # Used by the Python script to fetch merged PRs and their release notes.
      # Credentials: Settings → Secrets and variables → Actions in mattermost/docs
      #   CHANGELOG_READ_APP_ID        (variable)
      #   CHANGELOG_READ_INSTALL_ID    (variable)
      #   CHANGELOG_READ_PRIVATE_KEY   (secret)
      - name: Get read token (source repos)
        uses: mattermost/github-app-installation-token-action@4d4c8c09a49df5b54e1eafd372d1a1e44fdcab13
        id: readToken
        with:
          appId: "${{ vars.CHANGELOG_READ_APP_ID }}"
          installationId: "${{ vars.CHANGELOG_READ_INSTALL_ID }}"
          privateKey: ${{ secrets.CHANGELOG_READ_PRIVATE_KEY }}
 
      # App 2: Read/write access to mattermost/docs.
      # Used to check out this repo, push the changelog branch, and open the PR.
      # Credentials: Settings → Secrets and variables → Actions in mattermost/docs
      #   CHANGELOG_WRITE_APP_ID       (variable)
      #   CHANGELOG_WRITE_INSTALL_ID   (variable)
      #   CHANGELOG_WRITE_PRIVATE_KEY  (secret)
      - name: Get write token (docs repo)
        uses: mattermost/github-app-installation-token-action@4d4c8c09a49df5b54e1eafd372d1a1e44fdcab13
        id: writeToken
        with:
          appId: "${{ vars.CHANGELOG_WRITE_APP_ID }}"
          installationId: "${{ vars.CHANGELOG_WRITE_INSTALL_ID }}"
          privateKey: ${{ secrets.CHANGELOG_WRITE_PRIVATE_KEY }}
 
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          token: ${{ steps.writeToken.outputs.token }}
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install requests anthropic
 
      - name: Generate changelog
        env:
          GITHUB_TOKEN: ${{ steps.readToken.outputs.token }} # Read-only token for fetching PRs from source repos
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }} # Add this secret under Settings → Secrets and variables → Actions to enable AI categorization and proofreading
          MILESTONE: ${{ inputs.milestone }}
          VERSION: ${{ inputs.version }}
          REPOS: ${{ inputs.server_repos }} # Comma-separated repos to pull PRs from
          BLOG_POST_URL: ${{ inputs.blog_post_url }}
          CHANGELOG_PATH: source/product-overview/mattermost-v11-changelog.md
        run: python .github/scripts/generate_changelog.py
 
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ steps.writeToken.outputs.token }}
        run: |
          git config user.name "${{ vars.CHANGELOG_GIT_USERNAME }}"
          git config user.email "${{ vars.CHANGELOG_GIT_EMAIL }}"
          git checkout -b "changelog/${{ inputs.version }}"
          git add source/product-overview/mattermost-v11-changelog.md
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "docs: add changelog for ${{ inputs.version }}"
          git push origin "changelog/${{ inputs.version }}" --force
          gh pr create \
            --title "Changelog: ${{ inputs.version }}" \
            --body "Auto-generated changelog for milestone \`${{ inputs.milestone }}\` from \`${{ inputs.server_repos }}\`." \
            --base main \
            --head "changelog/${{ inputs.version }}"
