 · YML
name: Update Docs
 
# Only members with write access to this repo can trigger workflow_dispatch.
# To further restrict (e.g. require a specific team), protect the branch or
# add an environment with required reviewers in repo Settings → Environments.
on:
  workflow_dispatch:
    inputs:
      component:
        description: 'Which component is releasing?'
        required: true
        type: choice
        options:
          - Server
          - Mobile
          - Desktop
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - Feature Release
          - ESR
          - Security Release
          - Patch / Dot Release
          - Other
      version:
        description: 'Version number (e.g., 11.7, 2.40, 6.2, 5.13.6)'
        required: true
        type: string
      release_date:
        description: 'Release date (e.g., May 15, 2026)'
        required: true
        type: string
      instructions:
        description: 'Additional context for this release (e.g., "ESR end-of-support date: November 15, 2026"). Keep concise — appended to the Claude prompt as-is.'
        required: false
        type: string
      pr_draft:
        description: 'Open PR as draft?'
        required: false
        type: boolean
        default: false
 
jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
 
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install "anthropic==0.101.0"
 
      - name: Run docs update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COMPONENT: ${{ inputs.component }}
          RELEASE_TYPE: ${{ inputs.release_type }}
          VERSION: ${{ inputs.version }}
          RELEASE_DATE: ${{ inputs.release_date }}
          INSTRUCTIONS: ${{ inputs.instructions }}
        run: python .github/scripts/update_docs.py
 
      - name: Normalize version for branch naming
        id: vars
        shell: bash
        run: |
          safe_version="$(printf '%s' "${{ inputs.version }}" | tr ' /' '--' | tr -cd '[:alnum:]._-')"
          test -n "$safe_version"
          echo "safe_version=$safe_version" >> "$GITHUB_OUTPUT"
 
      - name: Commit and push changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "docs/${{ inputs.component }}-v${{ steps.vars.outputs.safe_version }}"
          git add source/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No files were modified — skipping PR creation."
          else
            git commit -m "docs: update ${{ inputs.component }} files for v${{ inputs.version }} ${{ inputs.release_type }}"
            git push origin "docs/${{ inputs.component }}-v${{ steps.vars.outputs.safe_version }}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
 
      - name: Create pull request
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMPONENT: ${{ inputs.component }}
          VERSION: ${{ inputs.version }}
          RELEASE_TYPE: ${{ inputs.release_type }}
          RELEASE_DATE: ${{ inputs.release_date }}
          INSTRUCTIONS: ${{ inputs.instructions }}
          PR_DRAFT: ${{ inputs.pr_draft }}
        run: |
          DRAFT_FLAG=""
          [ "$PR_DRAFT" = "true" ] && DRAFT_FLAG="--draft"
 
          {
            echo "## ${COMPONENT} v${VERSION} ${RELEASE_TYPE} Documentation Update"
            echo ""
            echo "Auto-generated by the **Update Docs** workflow."
            echo ""
            echo "**Release details:**"
            echo "- Component: ${COMPONENT}"
            echo "- Version: v${VERSION}"
            echo "- Release type: ${RELEASE_TYPE}"
            echo "- Release date: ${RELEASE_DATE}"
            [ -n "${INSTRUCTIONS}" ] && echo "- Notes: ${INSTRUCTIONS}"
            echo ""
            echo "Please review all changes carefully before merging."
          } > pr_body.md
 
          gh pr create \
            --title "${COMPONENT} v${VERSION} ${RELEASE_TYPE} Docs" \
            --body-file pr_body.md \
            --label "release-docs" \
            $DRAFT_FLAG
