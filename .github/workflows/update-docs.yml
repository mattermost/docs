name: Update Docs
 
on:
  workflow_dispatch:
    inputs:
      component:
        description: 'Which component is releasing?'
        required: true
        type: choice
        options:
          - Server
          - Mobile
          - Desktop
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - Feature Release
          - ESR
          - Security Release
          - Patch / Dot Release
          - Other
      version:
        description: 'Version number (e.g., 11.7, 2.40, 6.2, 5.13.6)'
        required: true
        type: string
      release_date:
        description: 'Release date (e.g., May 15, 2026)'
        required: true
        type: string
      instructions:
        description: 'Additional instructions (e.g., ESR end-of-support date, what changed, files to skip)'
        required: false
        type: string
      pr_draft:
        description: 'Open PR as draft?'
        required: false
        type: boolean
        default: false
 
jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
 
      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install anthropic
 
      - name: Run docs update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COMPONENT: ${{ inputs.component }}
          RELEASE_TYPE: ${{ inputs.release_type }}
          VERSION: ${{ inputs.version }}
          RELEASE_DATE: ${{ inputs.release_date }}
          INSTRUCTIONS: ${{ inputs.instructions }}
        run: python .github/scripts/update_docs.py
 
      - name: Create pull request
        uses: peter-evans/create-pull-request@f230e4b8d3f1f2f2c8f2a9a0d6c1f3f3b7e3d1a0 # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: docs/${{ inputs.component }}-v${{ inputs.version }}
          title: '${{ inputs.component }} v${{ inputs.version }} ${{ inputs.release_type }} Docs'
          body: |
            ## ${{ inputs.component }} v${{ inputs.version }} ${{ inputs.release_type }} Documentation Update
 
            Auto-generated by the **Update Docs** workflow.
 
            **Release details:**
            - Component: ${{ inputs.component }}
            - Version: v${{ inputs.version }}
            - Release type: ${{ inputs.release_type }}
            - Release date: ${{ inputs.release_date }}
            ${{ inputs.instructions != '' && format('- Notes: {0}', inputs.instructions) || '' }}
 
            Please review all changes carefully before merging.
          commit-message: 'docs: update ${{ inputs.component }} files for v${{ inputs.version }} ${{ inputs.release_type }}'
          labels: 'release-docs'
          draft: ${{ inputs.pr_draft }}
  
